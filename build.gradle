plugins {
    id 'java'
}

group = 'com.neonark'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // PostgreSQL driver (optional if you later connect DB from Java)
    implementation 'org.postgresql:postgresql:42.7.3'
}

tasks.withType(Test) {
    useJUnitPlatform()
}